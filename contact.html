<section class="page-hero">
  <div class="wrap">
    <div class="eyebrow">Contact</div>
    <h1>Let's talk about where you actually are — not where a deck says you should be.</h1>
  </div>
</section>

<section class="section reveal">
  <div class="wrap">

    <p class="contact-info">
      Prefer email? Reach out directly at
      <strong>tuan.nguyen@brandhere.vn</strong>
    </p>

    <!--
      LƯU Ý CHO NGƯỜI TRIỂN KHAI (Alton):
      Form dưới đây hiện CHƯA gửi được email thật. Để form hoạt động miễn phí, không cần code backend:
      1. Đăng ký tài khoản miễn phí tại https://formspree.io
      2. Tạo một "Form", Formspree sẽ cho một endpoint dạng https://formspree.io/f/xxxxxxx
      3. Thay giá trị "action" của thẻ <form> bên dưới bằng endpoint đó
      Sau bước này, mỗi khi có người gửi form, bạn sẽ nhận được email thông báo.
    -->
    <form class="contact-grid" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div>
        <label for="company">Company</label>
        <input type="text" id="company" name="company">
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div>
        <label for="message">What are you looking to solve?</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <button type="submit" class="btn-gold">Send message</button>
    </form>

  </div>
</section>
